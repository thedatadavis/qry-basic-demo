version: 2

models:
  - name: users_model
    description: Demo users published from Snowflake through Qry.
    config:
      meta:
        qry:
          endpoint: users
          path: /users
          description: Look up demo users for the Build Week walkthrough.
          parameters:
            user_id:
              column: user_id
              type: integer
              required: false
          max_materialized_rows: 1000
          max_response_rows: 100
          timeout_seconds: 15
          rate_limit_per_min: 100
